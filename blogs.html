<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dispatches | After Trials</title>
  <meta name="description" content="Read the latest dispatches, news, and reports from the After Trials collective front.">
  <link rel="stylesheet" href="style.css?v=75">
  <style>
    .blogs-page {
      background-color: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .blogs-header {
      padding: 4rem 2rem;
      text-align: center;
      border-bottom: 1px solid var(--border);
    }

    .blogs-eyebrow {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-secondary);
      margin-bottom: 1rem;
      display: block;
    }

    .blogs-title {
      font-size: clamp(3rem, 6vw, 4.5rem);
      margin-bottom: 1rem;
    }

    .blogs-subtitle {
      color: var(--text-secondary);
      max-width: 600px;
      margin: 0 auto;
    }

    .blogs-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 4rem 2rem;
      width: 100%;
    }

    .blogs-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 3rem;
    }

    .blog-card {
      display: flex;
      flex-direction: column;
      text-decoration: none;
      color: inherit;
      border: 1px solid var(--border);
      padding: 2rem;
      transition: var(--transition);
      background-color: var(--bg);
    }

    .blog-card:hover {
      border-color: var(--text);
      transform: translateY(-4px);
    }

    .blog-meta {
      font-size: 0.75rem;
      color: var(--text-secondary);
      margin-bottom: 1rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .blog-card-title {
      font-family: var(--font-serif);
      font-size: 1.75rem;
      line-height: 1.2;
      margin-bottom: 1rem;
      font-weight: 300;
    }

    .blog-excerpt {
      color: var(--text-secondary);
      font-size: 0.95rem;
      line-height: 1.6;
      margin-bottom: 2rem;
      flex-grow: 1;
    }

    .read-more {
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text);
      display: inline-flex;
      align-items: center;
      margin-top: auto;
    }

    .read-more::after {
      content: '→';
      margin-left: 0.5rem;
      transition: transform 0.3s ease;
    }

    .blog-card:hover .read-more::after {
      transform: translateX(4px);
    }

    .back-nav {
      position: absolute;
      top: 2rem;
      left: 2rem;
      text-decoration: none;
      color: var(--text-secondary);
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      font-weight: 600;
      transition: color 0.3s ease;
    }

    .back-nav:hover {
      color: var(--text);
    }
  </style>
</head>
<body class="blogs-page">

  <header class="blogs-header">
    <a href="index.html" class="back-nav">← After Trials</a>
    <span class="blogs-eyebrow">The Archive</span>
    <h1 class="blogs-title">Dispatches</h1>
    <p class="blogs-subtitle">Official communications, network updates, and perspectives from the sovereign collective front.</p>
  </header>

  <main class="blogs-container">
    <div class="blogs-grid" id="blogs-grid">
      <!-- Blogs injected here -->
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-auth.js?v=3"></script>

  <!-- Render the grid -->
  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      const grid = document.getElementById("blogs-grid");
      
      // Fetch from Supabase
      const posts = await window.SupabaseAuth.getPublishedBlogs();

      if (!posts || posts.length === 0) {
        grid.innerHTML = "<p style='color: var(--text-secondary); grid-column: 1 / -1; text-align: center;'>No dispatches have been published yet.</p>";
        return;
      }
      
      posts.forEach((post, index) => {
        const delay = index * 0.1;
        
        // Format date beautifully
        const dateObj = new Date(post.published_at);
        const formattedDate = dateObj.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
        
        const card = document.createElement("a");
        const isLocalhost = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
        card.href = isLocalhost ? `blog-post.html?slug=${post.slug}` : `/blog/${post.slug}`;
        card.target = "_blank";
        card.className = "blog-card";
        card.style.animation = `fadeInUp 0.6s ease forwards ${delay}s`;
        card.style.opacity = "0"; // initial state for animation
        
        const timeRead = post.read_time_minutes ? `${post.read_time_minutes} MIN READ` : '5 MIN READ';

        card.innerHTML = `
          <div class="blog-meta">${formattedDate} &nbsp;|&nbsp; ${timeRead}</div>
          <h2 class="blog-card-title">${post.title}</h2>
          <p class="blog-excerpt">${post.excerpt || ''}</p>
          <span class="read-more">Read Dispatch</span>
        `;
        
        grid.appendChild(card);
      });
    });
  </script>

  <style>
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>

</body>
</html>
