<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dispatch | After Trials</title>
  <link rel="stylesheet" href="/style.css?v=76">
  <style>
    .reader-page {
      background-color: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .reader-nav {
      position: sticky;
      top: 0;
      background-color: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(10px);
      padding: 1.5rem 2rem;
      border-bottom: 1px solid var(--border);
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .nav-brand {
      font-family: var(--font-serif);
      font-size: 1.2rem;
      text-decoration: none;
      color: var(--text);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .nav-back {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--text-secondary);
      text-decoration: none;
    }

    .nav-back:hover {
      color: var(--text);
    }

    .reader-header {
      max-width: 800px;
      margin: 6rem auto 3rem;
      padding: 0 2rem;
      text-align: center;
    }

    .post-meta {
      font-size: 0.85rem;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.15em;
      margin-bottom: 2rem;
      display: block;
    }

    .post-title {
      font-family: var(--font-serif);
      font-size: clamp(2.5rem, 6vw, 4.5rem);
      line-height: 1.1;
      margin-bottom: 2rem;
      font-weight: 300;
      letter-spacing: -0.02em;
    }

    .post-author {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text);
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      padding: 1rem 0;
      display: inline-block;
      min-width: 200px;
    }

    .reader-content {
      max-width: 720px;
      margin: 0 auto 8rem;
      padding: 0 2rem;
    }

    .reader-content p {
      font-size: 1.15rem;
      line-height: 1.8;
      color: var(--text);
      margin-bottom: 2rem;
    }

    .reader-content h2,
    .reader-content h3 {
      font-family: var(--font-serif);
      font-size: 2rem;
      margin: 4rem 0 1.5rem;
      font-weight: 300;
      color: var(--text);
    }

    .reader-content blockquote {
      font-family: var(--font-serif);
      font-size: 1.5rem;
      line-height: 1.5;
      font-style: italic;
      color: var(--text);
      margin: 4rem 0;
      padding-left: 2rem;
      border-left: 2px solid var(--text);
    }

    .reader-content strong {
      color: var(--text);
      font-weight: 600;
    }

    .reader-content a {
      color: var(--text);
      text-decoration: underline;
      text-decoration-thickness: 1px;
      text-underline-offset: 4px;
      transition: color 0.3s;
    }

    .reader-content a:hover {
      color: var(--text-secondary);
    }

    .reader-content ul, 
    .reader-content ol {
      margin-bottom: 2rem;
      padding-left: 2rem;
      font-size: 1.15rem;
      line-height: 1.8;
      color: var(--text);
    }

    .reader-content li {
      margin-bottom: 0.5rem;
    }

    .error-msg {
      text-align: center;
      margin-top: 10rem;
      color: var(--text-secondary);
    }

    /* Footer override to look nice */
    .reader-footer {
      border-top: 1px solid var(--border);
      padding: 4rem 2rem;
      text-align: center;
    }
  </style>
</head>
<body class="reader-page">

  <nav class="reader-nav">
    <a href="/" class="nav-brand">After Trials</a>
    <a href="/blogs" class="nav-back">← All Dispatches</a>
  </nav>

  <article id="post-container" style="opacity: 0; transition: opacity 0.4s ease;">
    <header class="reader-header">
      <span class="post-meta" id="display-date"></span>
      <h1 class="post-title" id="display-title"></h1>
      <div class="post-author" id="display-author"></div>
    </header>

    <div class="reader-content" id="display-content">
      <!-- HTML content injected here -->
    </div>
  </article>

  <footer class="reader-footer">
    <p style="color: var(--text-secondary); font-size: 0.85rem; letter-spacing: 0.1em; text-transform: uppercase;">The Sovereign Healthcare Network</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="/supabase-auth.js?v=4"></script>
  
  <!-- Hydrate the page from Supabase -->
  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      try {
        const urlParams = new URLSearchParams(window.location.search);
        let slug = urlParams.get('slug');
        
        // Handle clean SEO URLs (e.g. /blog/my-post)
        if (!slug && window.location.pathname.includes('/blog/')) {
          const parts = window.location.pathname.split('/blog/');
          if (parts.length > 1) {
            slug = parts[1].split('/')[0].split('?')[0];
          }
        }
        
        if (!slug) {
          renderError("No slug provided in URL.");
          return;
        }

        if (typeof window.SupabaseAuth === 'undefined') {
          throw new Error("Supabase Auth script failed to load. (404 on /supabase-auth.js)");
        }

        const post = await window.SupabaseAuth.getBlogBySlug(slug);

        if (post) {
          // Format date
          const dateObj = new Date(post.published_at || new Date());
          const formattedDate = dateObj.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
          const timeRead = post.read_time_minutes ? `${post.read_time_minutes} MIN READ` : '5 MIN READ';

          // Update DOM
          document.title = post.seo_title || `${post.title} | After Trials`;
          document.getElementById("display-title").innerText = post.title || 'Untitled';
          document.getElementById("display-date").innerText = `${formattedDate}  |  ${timeRead}`;
          document.getElementById("display-author").innerText = "After Trials Council";
          
          // Render content (Convert Markdown to HTML if needed)
          let finalHtml = '';
          if (post.html_content) {
            finalHtml = post.html_content;
          } else if (post.content) {
            // Configure marked for semantic HTML output (perfect for SEO)
            marked.setOptions({
              breaks: true,
              gfm: true
            });
            finalHtml = marked.parse(post.content);
          }
          document.getElementById("display-content").innerHTML = finalHtml;

          // Dynamic SEO injection
          let metaDesc = document.querySelector('meta[name="description"]');
          if (!metaDesc) {
            metaDesc = document.createElement('meta');
            metaDesc.name = "description";
            document.head.appendChild(metaDesc);
          }
          metaDesc.setAttribute("content", post.seo_description || post.excerpt || "");
          
          // Add OG tags dynamically
          const head = document.head;
          const ogTags = `
            <meta property="og:title" content="${post.seo_title || post.title}">
            <meta property="og:description" content="${post.seo_description || post.excerpt}">
            <meta property="og:image" content="${post.cover_image || 'https://aftertrials.com/assets/social-banner.jpg'}">
            <meta property="og:type" content="article">
          `;
          head.insertAdjacentHTML('beforeend', ogTags);

          // Smoothly fade in the page
          document.getElementById("post-container").style.opacity = "1";

        } else {
          renderError("Dispatch not found in database. Check if the slug matches exactly, or if RLS is blocking the read.");
        }
      } catch (err) {
        console.error("Hydration error:", err);
        renderError(err.message);
      }

      function renderError(msg) {
        document.getElementById("post-container").innerHTML = `
          <div class="error-msg">
            <h2>Dispatch Not Found</h2>
            <p>This record may have been moved or redacted.</p>
            <br>
            <p style="color: red; font-size: 0.85rem; max-width: 500px; margin: 0 auto;">Debug Info: ${msg}</p>
            <br><br>
            <a href="blogs.html" style="color: var(--text); text-decoration: underline;">Return to Archive</a>
          </div>
        `;
        document.getElementById("post-container").style.opacity = "1";
      }
    });
  </script>

</body>
</html>
